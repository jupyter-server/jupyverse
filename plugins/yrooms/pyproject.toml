[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "fps_yrooms"
version = "0.2.0"
description = "An FPS plugin for YRooms"
keywords = [ "jupyter", "server", "fastapi", "plugins" ]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: BSD License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]
dependencies = [
  "anyio",
  "fps",
  "jupyter-ydoc >=3.4.0,<4.0.0",
  "jupyverse-api >=0.15.0,<0.16.0",
  "jupyverse-contents >=0.1.0,<0.2.0",
  "jupyverse-file-id >=0.1.0,<0.2.0",
  "jupyverse-yrooms >=0.1.0,<0.2.0",
  "jupyverse-ystore >=0.1.0,<0.2.0",
  "pycrdt",
  "pydantic",
  "structlog",
]
license = "BSD-3-Clause"
license-files = ["COPYING.md"]

[[project.authors]]
name = "Jupyter Development Team"
email = "jupyter@googlegroups.com"

[project.readme]
file = "README.md"
content-type = "text/markdown"

[project.urls]
Homepage = "https://jupyter.org"

[project.entry-points]
"fps.modules" = {yrooms = "fps_yrooms.main:YRoomsModule"}
"jupyverse.modules" = {yrooms = "fps_yrooms.main:YRoomsModule"}
